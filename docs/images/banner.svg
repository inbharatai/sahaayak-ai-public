<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9933;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138808;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9933" />
      <stop offset="50%" style="stop-color:#000080" />
      <stop offset="100%" style="stop-color:#138808" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" rx="20" fill="#0d1117"/>

  <!-- Gradient accent bar top -->
  <rect width="900" height="4" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="80" cy="150" r="120" fill="#FF993310" />
  <circle cx="820" cy="150" r="120" fill="#13880810" />
  <circle cx="450" cy="150" r="180" fill="#00008010" />

  <!-- Ashoka Chakra inspired ring -->
  <circle cx="450" cy="110" r="45" fill="none" stroke="#000080" stroke-width="2" opacity="0.3"/>
  <circle cx="450" cy="110" r="35" fill="none" stroke="#000080" stroke-width="1" opacity="0.2"/>

  <!-- Spokes -->
  <g opacity="0.15" stroke="#000080" stroke-width="1.5">
    <line x1="450" y1="65" x2="450" y2="155"/>
    <line x1="405" y1="110" x2="495" y2="110"/>
    <line x1="418" y1="78" x2="482" y2="142"/>
    <line x1="482" y1="78" x2="418" y2="142"/>
  </g>

  <!-- Main title -->
  <text x="450" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" fill="white" filter="url(#shadow)">
    Sahaayak AI OS
  </text>

  <!-- Hindi subtitle -->
  <text x="450" y="155" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#8b949e">
    सहायक — Your AI Operating System for Bharat
  </text>

  <!-- Tagline -->
  <text x="450" y="195" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#58a6ff">
    Chat · Scan · Translate · Organize — in 13 Indian Languages
  </text>

  <!-- Feature pills -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">
    <!-- AI Chat -->
    <rect x="140" y="225" width="90" height="28" rx="14" fill="#FF993325" stroke="#FF9933" stroke-width="1"/>
    <text x="185" y="244" text-anchor="middle" fill="#FF9933">🤖 AI Chat</text>

    <!-- Voice -->
    <rect x="245" y="225" width="80" height="28" rx="14" fill="#3B82F625" stroke="#3B82F6" stroke-width="1"/>
    <text x="285" y="244" text-anchor="middle" fill="#3B82F6">🎙️ Voice</text>

    <!-- OCR -->
    <rect x="340" y="225" width="70" height="28" rx="14" fill="#10B98125" stroke="#10B981" stroke-width="1"/>
    <text x="375" y="244" text-anchor="middle" fill="#10B981">📷 OCR</text>

    <!-- Translation -->
    <rect x="425" y="225" width="110" height="28" rx="14" fill="#8B5CF625" stroke="#8B5CF6" stroke-width="1"/>
    <text x="480" y="244" text-anchor="middle" fill="#8B5CF6">🌐 Translation</text>

    <!-- Notes -->
    <rect x="550" y="225" width="75" height="28" rx="14" fill="#F59E0B25" stroke="#F59E0B" stroke-width="1"/>
    <text x="587" y="244" text-anchor="middle" fill="#F59E0B">📝 Notes</text>

    <!-- News -->
    <rect x="640" y="225" width="120" height="28" rx="14" fill="#EF444425" stroke="#EF4444" stroke-width="1"/>
    <text x="700" y="244" text-anchor="middle" fill="#EF4444">📰 Live News</text>
  </g>

  <!-- Gradient accent bar bottom -->
  <rect y="296" width="900" height="4" fill="url(#bg)"/>
</svg>
